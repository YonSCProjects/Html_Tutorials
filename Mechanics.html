<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>מכניקה 5 יח״ל — קורס עצמי (יחידות 0–2)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --panel2: #0f1730;
      --text: #e9ecff;
      --muted: #b7bee8;
      --accent: #7dd3fc;
      --accent2: #a78bfa;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #fb7185;
      --border: rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans Hebrew", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      background: radial-gradient(1200px 800px at 85% 10%, rgba(125,211,252,.18), transparent 60%),
                  radial-gradient(1100px 700px at 15% 35%, rgba(167,139,250,.16), transparent 62%),
                  linear-gradient(180deg, #070a14, var(--bg));
      color: var(--text);
      line-height: 1.6;
    }

    a { color: var(--accent); }
    a:hover { opacity: .9; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(7,10,20,.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(125,211,252,.85), rgba(167,139,250,.85));
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #061026;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .brand .sub {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      padding: 8px 10px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
    }

    .btn:hover { background: rgba(255,255,255,.10); }

    .btn.primary {
      background: linear-gradient(135deg, rgba(125,211,252,.25), rgba(167,139,250,.25));
      border-color: rgba(125,211,252,.35);
    }

    .layout {
      max-width: 1200px;
      margin: 16px auto 60px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      nav { position: static !important; }
      .brand { min-width: auto; }
    }

    nav {
      position: sticky;
      top: 76px;
      align-self: start;
      background: rgba(18,26,51,.72);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .navHead {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), transparent);
    }

    .progressWrap {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .progressBar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progressBar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, rgba(52,211,153,.95), rgba(125,211,252,.95), rgba(167,139,250,.95));
    }

    .navList {
      list-style: none;
      margin: 0;
      padding: 10px;
    }

    .navList li { margin: 6px 0; }

    .navLink {
      width: 100%;
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    .navLink:hover { background: rgba(255,255,255,.06); }

    .navLink.active {
      background: rgba(125,211,252,.12);
      border-color: rgba(125,211,252,.25);
    }

    .badge {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 12px;
      color: rgba(255,255,255,.6);
      flex: 0 0 auto;
    }

    .check.done {
      border-color: rgba(52,211,153,.4);
      background: rgba(52,211,153,.14);
      color: var(--good);
    }

    main {
      background: rgba(18,26,51,.52);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .content {
      padding: 18px 18px 24px;
    }

    .hero {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(125,211,252,.10), rgba(167,139,250,.08));
    }

    .hero h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      background: rgba(15,23,48,.75);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin: 14px 0;
      box-shadow: 0 8px 22px rgba(0,0,0,.25);
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 820px) {
      .grid2 { grid-template-columns: 1fr; }
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    h4 {
      margin: 14px 0 6px;
      font-size: 14px;
      color: var(--accent);
    }

    .muted { color: var(--muted); }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 10px;
    }

    .formula {
      font-family: var(--mono);
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      overflow: auto;
      direction: ltr;
      text-align: left;
      color: #f6f7ff;
    }

    /* עיצוב למונחים טכניים באנגלית בתוך טקסט עברי */
    .ltr {
      direction: ltr;
      display: inline-block;
      unicode-bidi: isolate;
    }

    .callout {
      border: 1px solid rgba(125,211,252,.28);
      background: rgba(125,211,252,.08);
      border-radius: var(--radius);
      padding: 12px;
      margin: 12px 0;
    }

    .callout.warn {
      border-color: rgba(251,191,36,.35);
      background: rgba(251,191,36,.10);
    }

    .callout.good {
      border-color: rgba(52,211,153,.35);
      background: rgba(52,211,153,.10);
    }

    .list {
      margin: 8px 0 0;
      padding-right: 18px;
    }

    .q {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin: 12px 0;
      background: rgba(255,255,255,.03);
    }

    .q .qtitle {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .q .qtitle strong { font-size: 14px; }

    details {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,.02);
    }

    details summary {
      cursor: pointer;
      color: var(--accent);
    }

    .mc {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .opt {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.02);
      cursor: pointer;
    }

    .opt input { margin-top: 3px; }

    .opt.correct {
      border-color: rgba(52,211,153,.35);
      background: rgba(52,211,153,.08);
    }

    .opt.wrong {
      border-color: rgba(251,113,133,.35);
      background: rgba(251,113,133,.08);
    }

    .small { font-size: 12px; }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .field {
      display: grid;
      gap: 6px;
      flex: 1 1 160px;
      min-width: 160px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
    }

    input::placeholder { color: rgba(233,236,255,.45); }

    .result {
      margin-top: 10px;
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 10px;
      color: var(--muted);
    }

    .kbd {
      font-family: var(--mono);
      font-size: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      padding: 2px 8px;
      border-radius: 10px;
      color: #f3f5ff;
      direction: ltr;
      display: inline-block;
    }

    .footerNav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      background: rgba(255,255,255,.03);
    }

    canvas {
      width: 100%;
      height: 260px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
    }

    .note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand">
      <div class="logo">F</div>
      <div>
        <h1>מכניקה 5 יח״ל — קורס עצמי</h1>
        <p class="sub">יחידות 0–2: פתיחה, קינמטיקה בקו ישר, תנועה בשני ממדים</p>
      </div>
    </div>

    <div class="actions">
      <div class="chip" title="ההתקדמות נשמרת על המכשיר שלך (LocalStorage)">
        🧠 <span id="progressText">התקדמות: 0%</span>
      </div>
      <button class="btn primary" id="markDoneBtn">סמן יחידה כהושלמה ✅</button>
      <button class="btn" id="resetBtn">איפוס התקדמות</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav>
    <div class="navHead">
      <div class="pill">🧭 ניווט מהיר</div>
      <div class="progressWrap">
        <div class="progressBar"><div id="progressFill"></div></div>
        <div class="small muted">טיפ: סמן יחידה כהושלמה כשסיימת. אפשר לחזור בכל רגע.</div>
      </div>
    </div>
    <ul class="navList" id="navList"></ul>
  </nav>

  <main>
    <div class="hero">
      <h2 id="pageTitle">טוען...</h2>
      <p id="pageSubtitle" class="muted">טוען...</p>
    </div>
    <div class="content" id="content"></div>

    <div class="footerNav">
      <button class="btn" id="prevBtn">◀ הקודם</button>
      <button class="btn primary" id="nextBtn">הבא ▶</button>
    </div>
  </main>
</div>

<script>
// ============================
// Data model: lessons (units)
// ============================
const LESSONS = [
  {
    id: "u0",
    title: "יחידה 0 — פתיחה: למה מכניקה זה מגניב?",
    subtitle: "מה לומדים פה, איך לומדים לבד, ואיך לחשוב כמו פיזיקאי (בלי להיבהל).",
    est: "20–35 דק׳",
    html: `
      <div class="card">
        <div class="pill">🎯 מטרות היחידה</div>
        <ul class="list">
          <li>להבין מה זה "מודל פיזיקלי" ולמה הוא תמיד קירוב.</li>
          <li>להכיר את 3 הכלים הכי חשובים בבגרות במכניקה: <b>גרפים</b>, <b>שרטוט כוחות</b>, <b>שימור</b>.</li>
          <li>ללמוד שיטת פתרון קבועה לשאלות.</li>
        </ul>
      </div>

      <div class="card">
        <h3>איך ללמוד כאן לבד (שיטה של 5 צעדים)</h3>
        <ol class="list">
          <li><b>סיפור → ציור:</b> מציירים מצב (סקיצה) ומסמנים נתונים.</li>
          <li><b>בחירת מודל:</b> "ללא חיכוך", "כוח קבוע", "תאוצה קבועה"...</li>
          <li><b>בחירת כלי:</b> קינמטיקה / ניוטון / אנרגיה / תנע (ביחידות הבאות).</li>
          <li><b>פתרון מסודר:</b> משוואות + יחידות + בדיקת היגיון.</li>
          <li><b>בדיקת מציאות:</b> האם התוצאה הגיונית? האם הכיוונים נכונים?</li>
        </ol>

        <div class="callout warn">
          <b>כלל זהב:</b> בבגרות כמעט תמיד יש "מוקש" קטן. אם אתה מרגיש שהכול קל מדי — עצור ובדוק יחידות/סימנים.
        </div>
      </div>

      <div class="card">
        <h3>מושגים בסיסיים (חובה לפני קינמטיקה)</h3>
        <div class="grid2">
          <div class="callout">
            <b>סקאלר</b> — גודל בלי כיוון (זמן, מסה, אנרגיה).
            <p style="margin: 8px 0; font-size: 14px;">דמיינו שאתם שוקלים תפוח במשקל — המספר שמופיע (למשל 150 גרם) הוא <b>סקאלר</b>. לא משנה לאיזה כיוון התפוח מופנה, המסה שלו תמיד אותו מספר. אותו דבר לגבי זמן: אם עברו 3 שניות, זה 3 שניות — אין לזמן "כיוון". גדלים סקאלריים נוחים לעבוד איתם כי פשוט מחברים ומחסרים מספרים רגילים.</p>
            <div class="formula">t = 3 s</div>
          </div>
          <div class="callout">
            <b>וקטור</b> — גודל עם כיוון (העתק, מהירות, תאוצה, כוח).
            <p style="margin: 8px 0; font-size: 14px;">דמיינו שאתם נותנים הוראות הגעה לחבר: "לך 100 מטר צפונה". המספר לבד (100 מטר) לא מספיק — חייבים גם לציין <b>לאן</b>. זה וקטור: גודל + כיוון. בפיזיקה, כוח הוא וקטור כי חשוב לאן הוא דוחף; מהירות היא וקטור כי חשוב לאן נעים. כשעובדים עם וקטורים, לא מספיק לחבר מספרים — צריך להתחשב בכיוונים!</p>
            <div class="formula">v⃗ = 5 m/s east</div>
            <div class="note">כאן נכתוב וקטורים במילים/צירים, לא צריך LaTeX אמיתי.</div>
          </div>
        </div>

        <h4>דרך vs העתק (מוקש קלאסי)</h4>
        <p style="margin: 8px 0; font-size: 14px;">זה אחד ההבדלים הכי חשובים בפיזיקה, וגם אחד הכי מבלבלים:</p>
        <ul class="list">
          <li><b>דרך</b> — כמה הלכת בפועל (תמיד חיובי). דמיינו מד צעדים או מונה קילומטרים — הוא סופר כל מטר שעברתם, לא משנה לאן. אם הלכתם 10 מטר קדימה ו-10 מטר אחורה, הדרך היא 20 מטר.</li>
          <li><b>העתק</b> — שינוי מיקום (יכול להיות 0 גם אם הלכת הרבה). זה כמו לשאול "כמה התרחקת מנקודת ההתחלה ולאיזה כיוון?". אם יצאת מהבית וחזרת לבית — ההעתק שלך הוא 0, גם אם הלכת קילומטרים! העתק הוא <b>וקטור</b> — יש לו גודל וכיוון.</li>
        </ul>
        <div class="callout warn" style="margin-top: 12px;">
          <b>למה זה חשוב?</b> בבגרות רוב הנוסחאות עובדות עם <b>העתק</b>, לא עם דרך. אם תחשבו דרך במקום העתק, התשובה תהיה שגויה!
        </div>
      </div>

      <div class="card">
        <h3>משימת "חימום מוח" (אינטראקטיבית)</h3>
        <p class="muted">בחר את התשובה הנכונה ואז לחץ "בדיקה".</p>

        <div class="q" data-quiz="u0q1">
          <div class="qtitle">
            <strong>1) הלכת 10 מטר קדימה ואז 10 מטר אחורה. מה ההעתק שלך?</strong>
            <span class="badge">רב-ברירה</span>
          </div>
          <div class="mc">
            <label class="opt"><input type="radio" name="u0q1" value="A"><span>A) 20 מ׳</span></label>
            <label class="opt"><input type="radio" name="u0q1" value="B"><span>B) 0 מ׳</span></label>
            <label class="opt"><input type="radio" name="u0q1" value="C"><span>C) 10 מ׳</span></label>
            <label class="opt"><input type="radio" name="u0q1" value="D"><span>D) אי אפשר לדעת</span></label>
          </div>
          <div class="row" style="margin-top:10px">
            <button class="btn" onclick="checkMC('u0q1','B')">בדיקה</button>
            <span class="small muted" id="u0q1_msg"></span>
          </div>
          <details style="margin-top:10px">
            <summary>הסבר מלא</summary>
            <p>העתק = מיקום סופי − מיקום התחלתי. חזרת לנקודת ההתחלה, לכן ההעתק <b>0</b>. הדרך שעברת היא 20 מ׳.</p>
          </details>
        </div>

        <div class="q" data-quiz="u0q2">
          <div class="qtitle">
            <strong>2) למה בפיזיקה "מזניחים חיכוך" לפעמים?</strong>
            <span class="badge">רב-ברירה</span>
          </div>
          <div class="mc">
            <label class="opt"><input type="radio" name="u0q2" value="A"><span>A) כי חיכוך לא קיים בטבע</span></label>
            <label class="opt"><input type="radio" name="u0q2" value="B"><span>B) כי זה קירוב שמקל על המודל, כשחיכוך קטן יחסית</span></label>
            <label class="opt"><input type="radio" name="u0q2" value="C"><span>C) כי בבגרות אסור חיכוך</span></label>
            <label class="opt"><input type="radio" name="u0q2" value="D"><span>D) כי חיכוך תמיד שווה 0</span></label>
          </div>

// ============================
// Progress storage
// ============================
const STORE_KEY = "mech_course_progress_v1";

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(STORE_KEY)) || { done: {}, current: "u0" };
  } catch(e) {
    return { done: {}, current: "u0" };
  }
}

function saveProgress(p) {
  localStorage.setItem(STORE_KEY, JSON.stringify(p));
}

let progress = loadProgress();
let currentIndex = Math.max(0, LESSONS.findIndex(x => x.id === progress.current));
if (currentIndex === -1) currentIndex = 0;

// ============================
// Rendering
// ============================
const navList = document.getElementById("navList");
const content = document.getElementById("content");
const pageTitle = document.getElementById("pageTitle");
const pageSubtitle = document.getElementById("pageSubtitle");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const markDoneBtn = document.getElementById("markDoneBtn");

function renderNav() {
  navList.innerHTML = "";
  LESSONS.forEach((l, idx) => {
    const li = document.createElement("li");
    const btn = document.createElement("button");
    btn.className = "navLink" + (idx === currentIndex ? " active" : "");
    btn.onclick = () => goTo(idx);

    const left = document.createElement("div");
    left.style.display = "flex";
    left.style.gap = "10px";
    left.style.alignItems = "center";

    const chk = document.createElement("div");
    chk.className = "check" + (progress.done[l.id] ? " done" : "");
    chk.textContent = progress.done[l.id] ? "✓" : "";
    left.appendChild(chk);

    var title = document.createElement("div");
    title.innerHTML = '<div style="font-size:13px">' + l.title + '</div><div class="small muted">' + l.est + '</div>';
    left.appendChild(title);

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = "יחידה";

    btn.appendChild(left);
    btn.appendChild(badge);
    li.appendChild(btn);
    navList.appendChild(li);
  });
}

function renderLesson() {
  const l = LESSONS[currentIndex];
  pageTitle.textContent = l.title;
  pageSubtitle.textContent = l.subtitle;

  content.innerHTML = l.html;

  // Restore active nav highlight
  [...document.querySelectorAll(".navLink")].forEach((b, i) => {
    if (i === currentIndex) b.classList.add("active");
    else b.classList.remove("active");
  });

  // Update buttons
  document.getElementById("prevBtn").disabled = (currentIndex === 0);
  document.getElementById("nextBtn").disabled = (currentIndex === LESSONS.length - 1);

  // Store current
  progress.current = l.id;
  saveProgress(progress);

  // Recompute progress bar
  updateProgressUI();

  // Initialize interactive graphs if present
  initGraphs();
}

function updateProgressUI() {
  var total = LESSONS.length;
  var doneCount = LESSONS.reduce(function(acc, l) { return acc + (progress.done[l.id] ? 1 : 0); }, 0);
  var pct = Math.round((doneCount / total) * 100);
  progressFill.style.width = pct + "%";
  progressText.textContent = "התקדמות: " + pct + "%";

  // Update "done" button text
  var cur = LESSONS[currentIndex];
  markDoneBtn.textContent = progress.done[cur.id] ? "היחידה מסומנת כהושלמה ✅" : "סמן יחידה כהושלמה ✅";

  // Update nav checkmarks
  Array.from(document.querySelectorAll(".navList .check")).forEach(function(el, idx) {
    var id = LESSONS[idx].id;
    if (progress.done[id]) {
      el.classList.add("done");
      el.textContent = "✓";
    } else {
      el.classList.remove("done");
      el.textContent = "";
    }
  });
}

function goTo(idx) {
  currentIndex = idx;
  renderNav();
  renderLesson();
}

function checkMC(name, correct) {
  var selector = 'input[name="' + name + '"]';
  var radios = document.querySelectorAll(selector);
  var msg = document.getElementById(name + "_msg");
  var chosen = null;
  radios.forEach(function(r) { if (r.checked) chosen = r.value; });

  // Clear styling
  document.querySelectorAll(selector).forEach(function(r) {
    r.closest(".opt").classList.remove("correct", "wrong");
  });

  if (!chosen) {
    msg.textContent = "בחר תשובה ואז בדוק 🙂";
    msg.style.color = "var(--warn)";
    return;
  }

  // Mark selected
  var selectedSelector = 'input[name="' + name + '"][value="' + chosen + '"]';
  var correctSelector = 'input[name="' + name + '"][value="' + correct + '"]';
  var selected = document.querySelector(selectedSelector).closest(".opt");
  var correctOpt = document.querySelector(correctSelector).closest(".opt");

  if (chosen === correct) {
    selected.classList.add("correct");
    msg.textContent = "נכון! ✅";
    msg.style.color = "var(--good)";
  } else {
    selected.classList.add("wrong");
    correctOpt.classList.add("correct");
    msg.textContent = "לא בדיוק. סמן את ההסבר למטה ואז נסה שוב ✅";
    msg.style.color = "var(--bad)";
  }
}

function checkNumeric(inputId, correctValue, msgId) {
  var inp = document.getElementById(inputId);
  var msg = document.getElementById(msgId);
  var v = Number(inp.value);
  if (!inp.value) {
    msg.textContent = "הכנס מספר ואז בדוק 🙂";
    msg.style.color = "var(--warn)";
    return;
  }
  // Tolerance
  var tol = 1e-6;
  if (Math.abs(v - correctValue) < tol) {
    msg.textContent = "נכון! ✅ (" + correctValue + ")";
    msg.style.color = "var(--good)";
  } else {
    msg.textContent = "עוד לא. רמז: בדוק יחידות/נוסחה. (התשובה כאן: " + correctValue + ")";
    msg.style.color = "var(--bad)";
  }
}

// ============================
// Kinematics calculator
// ============================
function kinCalc() {
  const v0 = parseFloat(document.getElementById("v0").value);
  const a = parseFloat(document.getElementById("a").value);
  const t = parseFloat(document.getElementById("t").value);
  const out = document.getElementById("kinOut");

  if ([v0, a, t].some(x => Number.isNaN(x))) {
    out.textContent = "צריך להכניס v₀, a, t כדי לחשב (בשלושתם).";
    out.style.color = "var(--warn)";
    return;
  }
  var v = v0 + a * t;
  var dx = v0 * t + 0.5 * a * t * t;

  out.style.color = "var(--muted)";
  out.innerHTML = '<b>תוצאות:</b><br>' +
    '<span class="ltr">v = v₀ + a·t = ' + v0 + ' + ' + a + '·' + t + ' = <b>' + round2(v) + ' m/s</b></span><br>' +
    '<span class="ltr">Δx = v₀·t + 0.5·a·t² = ' + v0 + '·' + t + ' + 0.5·' + a + '·' + t + '² = <b>' + round2(dx) + ' m</b></span><br>' +
    '<span class="small muted">בדיקה: <span class="ltr">v</span> ביחידות <span class="ltr">m/s</span>, <span class="ltr">Δx</span> ביחידות <span class="ltr">m</span>.</span>';
}

function clearKin() {
  ["v0", "a", "t"].forEach(function(id) { document.getElementById(id).value = ""; });
  document.getElementById("kinOut").textContent = "הכנס ערכים ולחץ \"חשב\".";
  document.getElementById("kinOut").style.color = "var(--muted)";
}

function round2(x) {
  return Math.round(x * 100) / 100;
}

// ============================
// Projectile simulator
// ============================
function drawProjectile() {
  const v0 = parseFloat(document.getElementById("p_v0").value);
  const th = parseFloat(document.getElementById("p_th").value);
  const y0 = parseFloat(document.getElementById("p_y0").value);
  const g = parseFloat(document.getElementById("p_g").value);

  const out = document.getElementById("p_out");
  const canvas = document.getElementById("traj");
  const ctx = canvas.getContext("2d");

  if ([v0, th, y0, g].some(x => Number.isNaN(x))) {
    out.textContent = "יש ערך חסר. מלא את כל השדות.";
    out.style.color = "var(--warn)";
    return;
  }
  if (v0 <= 0 || g <= 0) {
    out.textContent = "וודא ש-v₀>0 וש-g>0.";
    out.style.color = "var(--warn)";
    return;
  }

  // Canvas sizing for crisp rendering
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * devicePixelRatio);
  canvas.height = Math.floor(rect.height * devicePixelRatio);
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const rad = th * Math.PI / 180;
  const v0x = v0 * Math.cos(rad);
  const v0y = v0 * Math.sin(rad);

  // Find flight time: y(t) = y0 + v0y·t - 0.5·g·t² = 0
  // Solve: -0.5·g·t² + v0y·t + y0 = 0
  const A = -0.5 * g, B = v0y, C = y0;
  const disc = B * B - 4 * A * C;
  if (disc < 0) {
    out.textContent = "לא מתקבל זמן פגיעה (דיסקרימיננטה שלילית). בדוק נתונים.";
    out.style.color = "var(--bad)";
    return;
  }
  const t1 = (-B + Math.sqrt(disc)) / (2 * A);
  const t2 = (-B - Math.sqrt(disc)) / (2 * A);
  const T = Math.max(t1, t2); // positive root

  const R = v0x * T;
  const tUp = v0y / g;
  const yMax = y0 + v0y * tUp - 0.5 * g * tUp * tUp;

  // Generate points
  const N = 200;
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = (T * i) / N;
    const x = v0x * t;
    const y = y0 + v0y * t - 0.5 * g * t * t;
    pts.push({ x, y });
  }

  // Determine scaling
  const maxX = Math.max(...pts.map(p => p.x), 1);
  const maxY = Math.max(...pts.map(p => p.y), 1);
  const pad = 22;
  const w = rect.width, h = rect.height;

  const sx = (w - 2 * pad) / maxX;
  const sy = (h - 2 * pad) / (maxY + 0.001);
  const s = Math.min(sx, sy);

  // Clear
  ctx.clearRect(0, 0, w, h);

  // Axes
  ctx.lineWidth = 1;
  ctx.strokeStyle = "rgba(255,255,255,.18)";
  ctx.beginPath();
  // x-axis
  ctx.moveTo(pad, h - pad);
  ctx.lineTo(w - pad, h - pad);
  // y-axis
  ctx.moveTo(pad, h - pad);
  ctx.lineTo(pad, pad);
  ctx.stroke();

  // Plot
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(125,211,252,.9)";
  ctx.beginPath();
  pts.forEach((p, i) => {
    const X = pad + p.x * s;
    const Y = (h - pad) - p.y * s;
    if (i === 0) ctx.moveTo(X, Y);
    else ctx.lineTo(X, Y);
  });
  ctx.stroke();

  // Mark start & end
  const start = pts[0];
  const end = pts[pts.length - 1];
  drawDot(ctx, pad + start.x * s, (h - pad) - start.y * s, "rgba(52,211,153,.95)");
  drawDot(ctx, pad + end.x * s, (h - pad) - end.y * s, "rgba(251,191,36,.95)");

  out.style.color = "var(--muted)";
  out.innerHTML = '<b>תוצאות משוערות:</b><br>' +
    '<span class="ltr">v₀ₓ = ' + round2(v0x) + ' m/s</span>, <span class="ltr">v₀ᵧ = ' + round2(v0y) + ' m/s</span><br>' +
    'זמן מעוף <span class="ltr">T ≈ <b>' + round2(T) + ' s</b></span><br>' +
    'טווח <span class="ltr">R ≈ <b>' + round2(R) + ' m</b></span><br>' +
    'גובה מקסימלי <span class="ltr">y<sub>max</sub> ≈ <b>' + round2(yMax) + ' m</b></span><br>' +
    '<span class="small muted">נקודה ירוקה = התחלה, נקודה צהובה = פגיעה בקרקע.</span>';
}

function drawDot(ctx, x, y, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
}

function resetProjectile() {
  document.getElementById("p_v0").value = 20;
  document.getElementById("p_th").value = 35;
  document.getElementById("p_y0").value = 0;
  document.getElementById("p_g").value = 10;
  document.getElementById("p_out").textContent = "לחץ \"שרטט מסלול\".";
  const canvas = document.getElementById("traj");
  const ctx = canvas.getContext("2d");
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * devicePixelRatio);
  canvas.height = Math.floor(rect.height * devicePixelRatio);
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0, 0, rect.width, rect.height);
}

// ============================
// Navigation buttons
// ============================
document.getElementById("prevBtn").onclick = () => {
  if (currentIndex > 0) goTo(currentIndex - 1);
};

document.getElementById("nextBtn").onclick = () => {
  if (currentIndex < LESSONS.length - 1) goTo(currentIndex + 1);
};

document.getElementById("markDoneBtn").onclick = () => {
  const id = LESSONS[currentIndex].id;
  progress.done[id] = true;
  saveProgress(progress);
  updateProgressUI();
};

document.getElementById("resetBtn").onclick = () => {
  if (confirm("לאפס התקדמות? זה ימחק סימוני 'הושלם'.")) {
    progress = { done: {}, current: "u0" };
    saveProgress(progress);
    currentIndex = 0;
    renderNav();
    renderLesson();
  }
};

// Initial render
renderNav();
renderLesson();
updateProgressUI();
</script>
